name: Check water notices

on:
  schedule:
    - cron: "0 8,20 * * *"   # 8 โมง, 2 ทุ่ม
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit seen_ids.json back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: uv run python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json water_notices.jsonl
          git diff --cached --quiet || git commit -m "chore: update seen_ids and notices [skip ci]"
          git push
